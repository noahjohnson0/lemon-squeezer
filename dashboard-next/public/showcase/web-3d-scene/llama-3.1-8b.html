<html><head><script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script><style>body { margin: 0; }#canvas { width: 100%; height: 100vh; display: block; }</style></head><body><canvas id="canvas"></canvas><script>let camera, scene, renderer; const width = window.innerWidth; const height = window.innerHeight; const canvas = document.getElementById("canvas"); const aspect = width / height; const fov = 75; const near = 0.1; const far = 1000; camera = new THREE.PerspectiveCamera(fov, aspect, near, far); camera.position.z = 5; scene = new THREE.Scene(); const ambientLight = new THREE.AmbientLight(0x333333); scene.add(ambientLight); const directionalLight = new THREE.DirectionalLight(0xffffff, 1); directionalLight.position.set(0, 1, 1); scene.add(directionalLight); const geometry = new THREE.TorusKnotGeometry(1, 0.3, 64, 16); const material = new THREE.MeshLambertMaterial({ color: 0xffcc00 }); const mesh = new THREE.Mesh(geometry, material); scene.add(mesh); renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true }); renderer.setSize(width, height); const animate = () => { requestAnimationFrame(animate); mesh.rotation.x += 0.01; mesh.rotation.y += 0.01; renderer.render(scene, camera); }; document.addEventListener("mousedown", (event) => { const rect = canvas.getBoundingClientRect(); const x = event.clientX - rect.left; const y = event.clientY - rect.top; const rx = (x / width) * 2 - 1; const ry = -(y / height) * 2 + 1; camera.position.x = rx; camera.position.y = ry; }); document.addEventListener("mousemove", (event) => { if (event.buttons === 1) { const rect = canvas.getBoundingClientRect(); const x = event.clientX - rect.left; const y = event.clientY - rect.top; const rx = (x / width) * 2 - 1; const ry = -(y / height) * 2 + 1; camera.lookAt(mesh.position); }); animate(); };</script></body></html>
