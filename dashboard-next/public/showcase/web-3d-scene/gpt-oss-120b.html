<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Three.js Interactive 3D Scene</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
  }
  canvas {
    display: block; /* removes scrollbars */
  }
</style>
<!-- Three.js library -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<!-- OrbitControls (non‑module version) -->
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
  // Wait until the page is fully loaded
  window.addEventListener('load', init);

  function init() {
    // Scene & Camera
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202020);
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(3, 3, 5);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0x404040, 1.5); // soft white light
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 2);
    directional.position.set(5, 10, 7.5);
    scene.add(directional);

    // Geometry – TorusKnot with a nice material
    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 150, 20);
    const material = new THREE.MeshStandardMaterial({
      color: 0x156289,
      emissive: 0x072534,
      roughness: 0.5,
      metalness: 0.1,
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Controls (mouse‑drag orbit)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // smooth animation

    // Resize handling
    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      // Rotate the object a little each frame for extra dynamism
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.01;
      controls.update(); // required when damping enabled
      renderer.render(scene, camera);
    }
    animate();
  }
</script>
</body>
</html>
