<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Torus Knot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0d0d1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }

        body.dragging {
            cursor: grabbing;
        }

        canvas {
            display: block;
        }

        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 0.04em;
            text-align: center;
            animation: fadeHint 2.5s ease-out 1s forwards;
            opacity: 0;
        }

        @keyframes fadeHint {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hint">🖱 Drag to orbit &bull; Scroll to zoom</div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js">
    </script>
    <script>
        (function() {
            // ─────────────────────────────────────
            // SCENE SETUP
            // ─────────────────────────────────────
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d1a);
            scene.fog = new THREE.Fog(0x0d0d1a, 8, 40);

            // ─────────────────────────────────────
            // CAMERA
            // ─────────────────────────────────────
            const camera = new THREE.PerspectiveCamera(
                55, // FOV
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );

            // ─────────────────────────────────────
            // RENDERER
            // ─────────────────────────────────────
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // ─────────────────────────────────────
            // LIGHTING
            // ─────────────────────────────────────
            // Soft ambient fill so shadows are not pure black
            const ambientLight = new THREE.AmbientLight(0x303050, 2.0);
            scene.add(ambientLight);

            // Key light (casts shadows)
            const keyLight = new THREE.DirectionalLight(0xfff5e8, 4.5);
            keyLight.position.set(8, 12, 4);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 1024;
            keyLight.shadow.mapSize.height = 1024;
            keyLight.shadow.camera.near = 0.5;
            keyLight.shadow.camera.far = 60;
            keyLight.shadow.camera.left = -10;
            keyLight.shadow.camera.right = 10;
            keyLight.shadow.camera.top = 10;
            keyLight.shadow.camera.bottom = -10;
            keyLight.shadow.bias = -0.0001;
            keyLight.shadow.normalBias = 0.02;
            scene.add(keyLight);

            // Rim / accent light
            const rimLight = new THREE.DirectionalLight(0x8888ff, 2.5);
            rimLight.position.set(-5, 1, -3);
            scene.add(rimLight);

            // Warm fill from below
            const fillLight = new THREE.PointLight(0xff7744, 8, 14, 1.5);
            fillLight.position.set(0, -3, 3);
            scene.add(fillLight);

            // ─────────────────────────────────────
            // STARFIELD
            // ─────────────────────────────────────
            const starsCount = 600;
            const starsGeometry = new THREE.BufferGeometry();
            const starsPositions = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount; i++) {
                starsPositions[i * 3] = (Math.random() - 0.5) * 50;
                starsPositions[i * 3 + 1] = (Math.random() - 0.5) * 35;
                starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.04,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // ─────────────────────────────────────
            // MAIN OBJECT – TORUS KNOT
            // ─────────────────────────────────────
            const torusKnotGeometry = new THREE.TorusKnotGeometry(1.0, 0.32, 200, 40);
            const torusKnotMaterial = new THREE.MeshStandardMaterial({
                color: new THREE.Color('#7c5cfc'),
                metalness: 0.15,
                roughness: 0.25,
            });
            const torusKnot = new THREE.Mesh(torusKnotGeometry, torusKnotMaterial);
            torusKnot.castShadow = true;
            torusKnot.receiveShadow = true;
            scene.add(torusKnot);

            // ─────────────────────────────────────
            // GROUND RING (subtle shadow-catcher)
            // ─────────────────────────────────────
            const ringGeometry = new THREE.TorusGeometry(1.45, 0.02, 32, 120);
            const ringMaterial = new THREE.MeshStandardMaterial({
                color: 0x444466,
                metalness: 0.6,
                roughness: 0.5,
                transparent: true,
                opacity: 0.5,
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = -1.8;
            ring.receiveShadow = true;
            scene.add(ring);

            // ─────────────────────────────────────
            // ORBIT STATE
            // ─────────────────────────────────────
            const spherical = {
                theta: Math.PI * 0.3, // azimuthal angle (around Y axis)
                phi: Math.PI * 0.28, // polar angle (from top)
                radius: 5.5,
            };

            // Derive initial camera position from spherical
            updateCameraPosition();

            let isDragging = false;
            let prevPointer = { x: 0, y: 0 };
            const rotateSpeed = 0.005;
            const zoomSpeed = 0.08;
            const minRadius = 2.2;
            const maxRadius = 18;
            const minPhi = 0.15;
            const maxPhi = Math.PI - 0.15;

            function updateCameraPosition() {
                const sp = spherical;
                camera.position.x = sp.radius * Math.sin(sp.phi) * Math.cos(sp.theta);
                camera.position.y = sp.radius * Math.cos(sp.phi);
                camera.position.z = sp.radius * Math.sin(sp.phi) * Math.sin(sp.theta);
                camera.lookAt(0, 0, 0);
            }

            // ─────────────────────────────────────
            // POINTER / MOUSE EVENTS
            // ─────────────────────────────────────
            const canvas = renderer.domElement;

            function getPointerPosition(e) {
                // e is either MouseEvent or Touch
                return { x: e.clientX, y: e.clientY };
            }

            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    isDragging = true;
                    prevPointer.x = e.clientX;
                    prevPointer.y = e.clientY;
                    document.body.classList.add('dragging');
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - prevPointer.x;
                const dy = e.clientY - prevPointer.y;

                spherical.theta -= dx * rotateSpeed;
                spherical.phi -= dy * rotateSpeed;
                spherical.phi = Math.max(minPhi, Math.min(maxPhi, spherical.phi));

                prevPointer.x = e.clientX;
                prevPointer.y = e.clientY;
                updateCameraPosition();
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    document.body.classList.remove('dragging');
                }
            });

            // Touch support
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    e.preventDefault();
                    isDragging = true;
                    prevPointer.x = e.touches[0].clientX;
                    prevPointer.y = e.touches[0].clientY;
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                const dx = e.touches[0].clientX - prevPointer.x;
                const dy = e.touches[0].clientY - prevPointer.y;

                spherical.theta -= dx * rotateSpeed;
                spherical.phi -= dy * rotateSpeed;
                spherical.phi = Math.max(minPhi, Math.min(maxPhi, spherical.phi));

                prevPointer.x = e.touches[0].clientX;
                prevPointer.y = e.touches[0].clientY;
                updateCameraPosition();
            }, { passive: false });

            window.addEventListener('touchend', () => {
                isDragging = false;
            });

            // Scroll zoom
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                spherical.radius += e.deltaY * zoomSpeed * 0.01;
                spherical.radius = Math.max(minRadius, Math.min(maxRadius, spherical.radius));
                updateCameraPosition();
            }, { passive: false });

            // ─────────────────────────────────────
            // RESIZE HANDLER
            // ─────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ─────────────────────────────────────
            // ANIMATION LOOP
            // ─────────────────────────────────────
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.1);
                const elapsed = performance.now() * 0.001; // seconds

                // Auto-rotate the torus knot
                torusKnot.rotation.y += dt * 0.5;
                torusKnot.rotation.x += dt * 0.15;
                torusKnot.rotation.z += dt * 0.08;

                // Subtle ring orbit
                ring.rotation.z += dt * 0.12;

                // Slowly twinkle stars
                stars.rotation.y += dt * 0.02;
                stars.rotation.x += dt * 0.006;

                // Pulse the fill light slightly
                const pulse = 1 + Math.sin(elapsed * 1.3) * 0.15;
                fillLight.intensity = 8 * pulse;

                // Ensure camera is looking at target (in case of any drift)
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }

            // Kick off
            animate();
        })();
    </script>
</body>
</html>
