<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Particle Physics Toy</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#111; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // canvas sizing
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // mouse state
  let mouse = { x: null, y: null, isDown: false };
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mousedown', e => {
    mouse.isDown = true;
    spawnBurst(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => { mouse.isDown = false; });

  // particle definition
  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2 + 0.5;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.radius = Math.random() * 2 + 1;
      this.life = Math.random() * 100 + 50; // frames
    }
    update() {
      // simple attraction/repulsion to mouse
      if (mouse.x !== null && mouse.y !== null) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq);
        const force = 100 / (distSq + 100); // constant tweak
        // attract when mouse is not pressed, repel when pressed
        const sign = mouse.isDown ? -1 : 1;
        this.vx += sign * force * dx / dist;
        this.vy += sign * force * dy / dist;
      }
      // apply velocity
      this.x += this.vx;
      this.y += this.vy;
      // damping
      this.vx *= 0.98;
      this.vy *= 0.98;
      this.life--;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fill();
    }
    isAlive() { return this.life > 0; }
  }

  const particles = [];
  // initial burst
  for (let i = 0; i < 200; i++) {
    particles.push(new Particle(canvas.width / 2, canvas.height / 2));
  }

  function spawnBurst(x, y) {
    for (let i = 0; i < 30; i++) {
      particles.push(new Particle(x, y));
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    // fade background
    ctx.fillStyle = 'rgba(17,17,17,0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // update and draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update();
      if (!p.isAlive()) {
        particles.splice(i, 1);
        continue;
      }
      p.draw(ctx);
    }

    // keep a certain amount
    while (particles.length < 150) {
      particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
    }
  }
  animate();
})();
</script>
</body>
</html>
